<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup Page</title>

  <style>
    
    * {
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      color: black;
    }

    /* LEFT GRADIENT PANEL */
    .left-side {
      width: 520px;
      background: linear-gradient(180deg,
          #0F913D 0%,
          #ABD9BB 0%,
          #FFFFFF 100%);
    }

    /* RIGHT SIDE PANEL */
    .right-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* LOGO */
    .logo {
      width: 100%;
      text-align: center;
      margin-bottom: 28px;
    }

    .logo img {
      width: 270px;
      height: auto;
      display: inline-block;
    }

    /* CARD */
    .card {
      width: 500px;
      padding: 25px 30px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.07);
    }

    /* PROGRESS BAR */
    .progress-container {
      display: flex;
      justify-content: space-between;
      margin-bottom: 35px;
      cursor: pointer;
      user-select: none;
    }

    .progress-bar {
      width: 30%;
      height: 4px;
      background: #E6E6E6;
      border-radius: 3px;
      opacity: 0.4;
      transition: 0.3s ease;
    }

    .progress-bar.active {
      background: #0F913D;
      opacity: 1;
    }

    /* LABELS */
    label {
      display: block;
      margin-bottom: 10px;
      font-size: 15px;
      font-weight: 200;
    }

    /* INPUTS */
    input,
    select {
      width: 100%;
      height: 42px;
      padding: 12px 14px;
      border: 1px solid #D6D6D6;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 20px;
      outline: none;
      background: white;
    }

    input:focus,
    select:focus {
      border-color: #0F913D;
    }

    /* CUSTOM SELECT */
    .select-wrapper {
      position: relative;
      width: 100%;
    }

    .select-wrapper select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 45px;
      cursor: pointer;
    }

    .select-chevron {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sd-caret {
      width: 18px;
      height: 18px;
    }

    /* BUTTON */
    .btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      background: #0F913D;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #0c6f2f;
    }

    /* FORM SECTIONS */
    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    /* FOOTER */
    .footer-text {
      font-size: 14px;
      margin-top: 20px;
      margin-bottom: 2px;
      text-align: start;
    }

    .footer-text a {
      color: #0F913D;
      text-decoration: none;
    }


/* INPUTS */
input,
select {
  width: 100%;
  height: 42px;
  padding: 0 14px;
  border: 1px solid #D6D6D6;
  border-radius: 8px;
  font-size: 15px;
  margin-bottom: 22px;
  outline: none;
  background: white;
  line-height: 42px;
}

input {
  display: block;
}

/* SELECT FIELD */
.field-input--select {
  position: relative;
  width: 100%;
}

/* REMOVE DEFAULT ARROW */
.field-input--select select {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  padding-right: 52px;
  cursor: pointer;
}

/* GREY RIGHT SECTION */
.field-input--select::after {
  content: "";
  position: absolute;
  top: 0;
  right: 0;

  width: 44px;
  height: 42px;

  background: #F3F4F6;
  border-left: 1px solid #D6D6D6;
  border-right: 1px solid #D6D6D6;
  border-top-right-radius: 8px;
  border-bottom-right-radius: 8px;

  pointer-events: none;
}

/* CHEVRON */
.select-chevron {
  position: absolute;
  top: 35%;
  right: 14px;
  transform: translateY(-50%);

  display: flex;
  align-items: center;
  justify-content: center;

  z-index: 2;
  pointer-events: none;
}

/* CARET */
.sd-caret {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}




    

    
  </style>
</head>

<body>

  <!-- LEFT SIDE -->
  <div class="left-side"></div>

  <!-- RIGHT SIDE -->
  <div class="right-side">

    <!-- LOGO -->
    <div class="logo">
      <img src="/static/images/PrecisionGrow.svg" alt="Precision Grow Logo" />
    </div>

    <!-- CARD -->
    <div class="card">

      <!-- PROGRESS BAR -->
      <div class="progress-container">
        <div class="progress-bar active" id="bar1" onclick="jumpTo(1)"></div>
        <div class="progress-bar" id="bar2" onclick="jumpTo(2)"></div>
        <div class="progress-bar" id="bar3" onclick="jumpTo(3)"></div>
      </div>

      <!-- FORM -->
      <form id="signupForm" action="/newregister" method="POST">

<!-- STEP 1 -->
<div id="step1Section" class="form-section active">

  <label>Select Role</label>

  <!-- SELECT FIELD -->
  <div class="field-input field-input--select">

    <select name="role" id="role" required>
      <option value="">Select role</option>
      <option value="farmer">Farmer</option>
      <option value="manufacturer">Manufacturer</option>
      <option value="distributor">Distributor</option>
      <option value="retailer">Retailer</option>
      <option value="transporter">Transporter</option>
      <option value="warehousing">Warehousing</option>
    </select>

    <span class="select-chevron">
      <img class="sd-caret"
        src="{{ url_for('static', filename='svg-icons/CaretDownProperty 1=Regular.svg') }}"
        alt="dropdown">
    </span>

  </div>

  <label>Name</label>

  <input type="text"
    name="name"
    id="name"
    placeholder="Enter name"
    required />

  <button type="button" class="btn" onclick="nextStep(2)">
    Next
  </button>

</div>

        <!-- STEP 2 -->
        <div id="step2Section" class="form-section">

          <label>Email</label>
          <input type="email" name="email" id="email" required />

          <label>Password</label>
          <input type="password" name="password" id="password" required />

          <button type="button" class="btn" onclick="nextStep(3)">
            Next
          </button>

        </div>

        <!-- STEP 3 -->
        <div id="step3Section" class="form-section">

          <label>Phone</label>
          <input type="text" name="phone" id="phone" required />

          <label>Location</label>
          <input type="text" name="location" id="location" required />

          <label>Address</label>
          <input type="text" name="address" />

          <label>Office Name</label>
          <input type="text" name="officeName" />

          <label>Office Address</label>
          <input type="text" name="officeAddress" />

          <label>GST Number</label>
          <input type="text" name="gstNumber" />

          <button type="submit" class="btn">
            Submit
          </button>

        </div>

      </form>

      <p class="footer-text">
        Already have an account?
        <a href="/newlogin">Login →</a>
      </p>

    </div>
  </div>

  <script>
    let step = 1;

    function updateProgress() {
      document.getElementById("bar1").classList.toggle("active", step >= 1);
      document.getElementById("bar2").classList.toggle("active", step >= 2);
      document.getElementById("bar3").classList.toggle("active", step >= 3);
    }

    function showStep() {
      document.querySelectorAll(".form-section")
        .forEach(s => s.classList.remove("active"));

      document.getElementById(`step${step}Section`)
        .classList.add("active");

      updateProgress();
    }

    function nextStep(newStep) {
      step = newStep;
      showStep();
    }

    function jumpTo(targetStep) {
      if (targetStep < step) {
        step = targetStep;
        showStep();
      }
    }
  </script>

</body>

</html>
